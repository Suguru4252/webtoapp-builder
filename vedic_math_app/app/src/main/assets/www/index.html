<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="header" id="header">
            <div class="username-row">
                <div class="username" id="username" onclick="showNicknameModal()">
                    👑 ИГРОК
                    <span class="warning-badge" id="warningBadge">⚠️ ЛОКАЛЬНО</span>
                </div>
                <div class="settings-icon" onclick="switchTab('profile')">⚙️</div>
            </div>
            
            <div class="balance-container">
                <div class="balance-label">БАЛАНС</div>
                <div class="balance-value" id="balance">$ 0</div>
                <div class="balance-sub" id="balanceChange">+ $ 0 (0%) за все время</div>
            </div>
            
            <div class="per-click">
                <span class="per-click-label">💰 за клик</span>
                <span class="per-click-value" id="clickPower">$ 3.0 тыс.</span>
            </div>
        </div>
        
        <div class="content" id="content"></div>
        
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-item active" onclick="switchTab('earn')"><span>👆</span>Заработок</div>
            <div class="nav-item" onclick="switchTab('calendar')"><span>📅</span>Календарь</div>
            <div class="nav-item" onclick="switchTab('space')"><span>🚀</span>Космос</div>
            <div class="nav-item" onclick="switchTab('achievements')"><span>🏆</span>Ачивки</div>
            <div class="nav-item" onclick="switchTab('investments')"><span>📈</span>Инвестиции</div>
            <div class="nav-item" onclick="switchTab('business')"><span>💼</span>Бизнес</div>
            <div class="nav-item" onclick="switchTab('mining')"><span>⛏️</span>Майнинг</div>
            <div class="nav-item" onclick="switchTab('tax')"><span>🏛️</span>Налоги</div>
            <div class="nav-item" onclick="switchTab('items')"><span>📦</span>Предметы</div>
            <div class="nav-item" onclick="switchTab('profile')"><span>👤</span>Профиль</div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>
    
    <div class="modal" id="adminPasswordModal">
        <div class="modal-content">
            <div class="modal-title">🔐 АДМИН ДОСТУП</div>
            <input type="password" class="input-field" id="adminPasswordInput" placeholder="Введите пароль">
            <div class="card-btn" style="background:#ffd700; color:black; margin-bottom:8px;" onclick="checkAdminPassword()">ВОЙТИ</div>
            <div class="close-btn" onclick="closeAdminPasswordModal()">ОТМЕНА</div>
        </div>
    </div>
    
    <div class="modal" id="nicknameModal">
        <div class="modal-content">
            <div class="modal-title">✏️ ИЗМЕНИТЬ НИК</div>
            <input type="text" class="input-field" id="nicknameInput" placeholder="Введите новый ник" maxlength="20">
            <div class="close-btn" style="background:#ffd700; color:black;" onclick="saveNickname()">СОХРАНИТЬ</div>
            <div class="close-btn" onclick="closeNicknameModal()">ОТМЕНА</div>
        </div>
    </div>
    
    <div class="modal" id="housesModal">
        <div class="modal-content" id="housesModalContent"></div>
    </div>
    
    <div class="modal" id="topModal">
        <div class="modal-content" id="topModalContent"></div>
    </div>
    
    <div class="modal" id="islandsModal">
        <div class="modal-content" id="islandsModalContent"></div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/game.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/earn.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/space.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/battlepass.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/taxes.js"></script>
    <script src="js/businesses.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/mining.js"></script>
    <script src="js/houses.js"></script>
    <script src="js/islands.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/clicker.js"></script>
    <script src="js/investments.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/intervals.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
